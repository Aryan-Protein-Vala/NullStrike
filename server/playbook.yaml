name: MAANG Scale Security Sweep
description: Full distributed test suite
targets:
  - localhost
  - 127.0.0.1
checks:
  - type: HostFileInspector
    paths:
      - /etc/shadow
      - /etc/passwd
      - /tmp/nullstrike_test
  - type: KubernetesEscape
  - type: EphemeralPortSweep
    ports:
      - 22
      - 80
      - 443
      - 50051
